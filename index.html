<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

.btn-back{width:34px;height:34px;border-radius:50%;border:1px solid rgba(184,150,46,.28);background:transparent;color:#B8962E;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#nav{display:flex;background:#111;border-top:1px solid rgba(184,150,46,.28);flex-shrink:0;}
.nav-btn{flex:1;padding:12px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:#555;}
.nav-btn.active{color:#B8962E;}
#screen-home{justify-content:flex-end;position:relative;}
.home-logo{position:absolute;top:0;left:0;right:0;display:flex;flex-direction:column;align-items:center;padding-top:56px;}

.ring-anim::after{content:'';position:absolute;top:50%;left:-3px;width:6px;height:6px;background:#B8962E;border-radius:50%;transform:translateY(-50%);}

.home-content{padding:0 36px 26px;position:relative;z-index:1;}
.home-h1{font-family:'Playfair Display',serif;font-size:40px;font-weight:400;line-height:1.05;margin-bottom:10px;}
.home-h1 em{font-style:italic;color:#B8962E;}
.screen-header{padding:44px 28px 12px;display:flex;align-items:center;gap:14px;flex-shrink:0;}
.tabs{display:flex;margin:0 28px 12px;border-bottom:1px solid rgba(255,255,255,.07);}
.tab{flex:1;padding:9px 8px;border:none;background:none;color:#555;font-size:11px;cursor:pointer;}
.tab.active{color:#B8962E;border-bottom:1px solid #B8962E;}

.upload-zone img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:none;}
.upload-icon{font-size:32px;opacity:.2;}
.cap-preview{position:absolute;inset:0;z-index:20;display:none;}
.cap-preview.visible{display:block;}
.cap-preview img{width:100%;height:100%;object-fit:cover;}
.preview-actions{position:absolute;bottom:16px;left:0;right:0;display:flex;gap:10px;padding:0 16px;}
.preview-actions button{flex:1;padding:12px;border-radius:30px;border:none;font-weight:600;cursor:pointer;}
.btn-preview-retake{background:rgba(224,96,96,.9);color:#fff;}

.ref-block{margin:11px 28px 0;padding:13px 15px;background:#111;border:1px solid rgba(255,255,255,.06);border-radius:12px;}
.ref-opts{display:flex;flex-wrap:wrap;gap:5px;}
.ref-opt{flex:1 0 calc(33% - 5px);padding:8px 5px;border:1px solid rgba(255,255,255,.08);background:transparent;color:#555;cursor:pointer;font-size:10px;border-radius:20px;}
.ref-opt.active{border-color:#B8962E;color:#B8962E;background:rgba(184,150,46,.1);}
#screen-analyzing{align-items:center;justify-content:center;}
.spin-ring{width:96px;height:96px;border-radius:50%;border:1px solid rgba(184,150,46,.15);border-top-color:#B8962E;animation:spin 1.4s linear infinite;margin-bottom:28px;}
.res-header{padding:44px 28px 18px;}
.res-mm-big{font-family:'Playfair Display',serif;font-size:72px;font-weight:400;}
.sizes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,255,255,.05);}
.scard{background:#111;padding:19px 11px;text-align:center;}
.scard-num{font-family:'Playfair Display',serif;font-size:34px;color:#fff;}
.save-btn{width:100%;padding:15px;background:#B8962E;color:#000;border:none;cursor:pointer;border-radius:30px;}

#toast.show{opacity:1;}
.ad-container{background:transparent;text-align:center;margin:16px 0;min-height:100px;display:flex;align-items:center;justify-content:center;}
.upload-actions{display:flex;gap:10px;margin:11px 28px 0;}
.upload-actions button{flex:1;}
</style>

<!-- ========== HOME ========== -->

  <div class="home-logo"><div class="ring-anim"></div><div class="brand-name">Anel Sizer</div></div>

  </div>
  <div class="tabs">
    <button class="tab active" id="tab-upload" onclick="setMode('upload')">📤 Upload</button>

    </div>
    <video id="cam-video" autoplay playsinline muted></video>
    <canvas id="cam-canvas" style="display:none;"></canvas>
    <div class="cap-preview" id="cap-preview">
      <img id="cap-preview-img" alt="">
      <div style="position:absolute;top:9px;left:50%;transform:translateX(-50%);padding:4px 13px;background:rgba(0,0,0,.8);border:1px solid #6dbf7e;color:#6dbf7e;border-radius:30px;">✓ Foto pronta</div>

      </div>
    </div>
  </div>
  
  <div class="cam-actions">
    <div id="capture-btn-wrap"><button class="btn-gold" onclick="captureFrame()">📸 Capturar foto</button></div>
  </div>
  
  <div class="upload-actions" id="upload-actions" style="display:none;">
    <button class="btn-ghost" onclick="document.getElementById('file-input').click()" style="border:1px solid rgba(184,150,46,.3);color:#B8962E;">📤 Escolher foto</button>

<!-- ========== ANALYZING ========== -->

</div>

<!-- ========== RESULT ========== -->
<div id="screen-result" class="screen">

  <!-- ========== BLOCO DE ANÚNCIO ADSENSE ========== -->
  <div class="ad-container">
    <!-- banner principal -->
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-7477605862577222"
         data-ad-slot="3485807294"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>
         (adsbygoogle = window.adsbygoogle || []).push({});

  <div style="padding:16px 28px;">

  </div>
</div>

<!-- ========== HISTORY ========== -->
<div id="screen-history" class="screen">
  <div class="screen-header"><button class="btn-back" onclick="go('home')">←</button><div class="screen-title">Histórico</div></div>

</div>

<!-- ========== CONFIG ========== -->
<div id="screen-config" class="screen">
  <div class="screen-header"><button class="btn-back" onclick="go('home')">←</button><div class="screen-title">Configurar</div></div>
  <div style="padding:20px;">
    <p style="color:#555;margin-bottom:10px;">Chave API DeepSeek</p>
    <input type="password" id="api-key-input" placeholder="sk-..." style="width:100%;padding:12px;background:#181818;border:1px solid #333;color:#fff;margin-bottom:10px;border-radius:12px;">
    <p style="color:#555;margin-bottom:10px;">URL Google Sheets</p>
    <input type="url" id="sheets-url-input" placeholder="https://script.google.com/..." style="width:100%;padding:12px;background:#181818;border:1px solid #333;color:#fff;margin-bottom:16px;border-radius:12px;">

  <div style="background:#111;width:100%;max-width:430px;padding:24px;border-radius:24px 24px 0 0;">
    <div style="font-size:20px;margin-bottom:20px;">Salvar</div>
    <input type="text" id="save-name" placeholder="Nome" style="width:100%;padding:12px;background:#181818;border:1px solid #333;color:#fff;margin-bottom:10px;border-radius:12px;">
    <input type="tel" id="save-wa" placeholder="WhatsApp" style="width:100%;padding:12px;background:#181818;border:1px solid #333;color:#fff;margin-bottom:20px;border-radius:12px;">

</nav>

</div>
<div id="toast"></div>

<script>
'use strict';
// ========== TABELA DE TAMANHOS ==========
const ST=[{mm:14.0,br:"10",us:"3",eu:"44"},{mm:14.4,br:"10.5",us:"3.25",eu:"45"},{mm:14.9,br:"11",us:"3.5",eu:"47"},{mm:15.3,br:"11.5",us:"3.75",eu:"48"},{mm:15.7,br:"12",us:"4",eu:"49"},{mm:16.1,br:"12.5",us:"4.5",eu:"51"},{mm:16.5,br:"13",us:"5",eu:"52"},{mm:16.9,br:"13.5",us:"5.5",eu:"53"},{mm:17.3,br:"14",us:"6",eu:"54"},{mm:17.7,br:"14.5",us:"6.5",eu:"56"},{mm:18.2,br:"15",us:"7",eu:"57"},{mm:18.6,br:"15.5",us:"7.5",eu:"58"},{mm:19.0,br:"16",us:"8",eu:"60"},{mm:19.4,br:"16.5",us:"8.5",eu:"61"},{mm:19.8,br:"17",us:"9",eu:"62"},{mm:20.2,br:"17.5",us:"9.5",eu:"63"},{mm:20.7,br:"18",us:"10",eu:"65"},{mm:21.1,br:"18.5",us:"10.5",eu:"66"},{mm:21.4,br:"19",us:"11",eu:"67"},{mm:21.8,br:"19.5",us:"11.5",eu:"68"},{mm:22.2,br:"20",us:"12",eu:"70"}];
const closestSize=mm=>ST.reduce((p,c)=>Math.abs(c.mm-mm)<Math.abs(p.mm-mm)?c:p);

// ========== REFERÊNCIAS ==========
const REFS={
  card:{nome:"💳 Cartão",w:85.6,h:54.0},
  coin:{nome:"🪙 Moeda R$1",w:27.0,h:27.0},
  bill10:{nome:"💵 Cédula R$10",w:135.0,h:65.0},
  ruler:{nome:"📏 Régua 10cm",w:100.0,h:10.0},
  qrcode:{nome:"📱 QR Code",w:40.0,h:40.0}
};
let selectedRef="card";

// ========== ESTADO ==========
let capturedImg=null,currentResult=null,camMode="upload",streamObj=null;
let historyData=[]; try{historyData=JSON.parse(localStorage.getItem("anel_sizer_final")||"[]");}catch(e){}
let API_KEY=localStorage.getItem("deepseek_key")||"";
let SHEETS_URL=localStorage.getItem("sheets_url")||"";

// ========== RENDER REFS ==========
function renderRefs(){
  const cont=document.getElementById("ref-opts");
  cont.innerHTML=Object.entries(REFS).map(([k,v])=>`<button class="ref-opt${k===selectedRef?' active':''}" data-ref="${k}" onclick="setRef(this)">${v.nome}</button>`).join("");
}
renderRefs();

// ========== NAVEGAÇÃO ==========
function go(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("screen-"+id).classList.add("active");
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.toggle("active",b.dataset.screen===id));
  if(id==="history") renderHistory();
  if(id!=="camera") stopCam();
}

// ========== CÂMERA ==========
async function startCam(){
  if(streamObj) return;
  try{
    streamObj=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
    const v=document.getElementById("cam-video");
    v.srcObject=streamObj; await v.play();
  }catch(e){ alert("Permita o acesso à câmera"); setMode('upload'); }
}
function stopCam(){ if(streamObj){ streamObj.getTracks().forEach(t=>t.stop()); streamObj=null; } }

function setMode(m){
  camMode=m;
  document.getElementById("tab-upload").classList.toggle("active",m==="upload");
  document.getElementById("tab-live").classList.toggle("active",m==="live");
  document.getElementById("upload-zone").style.display=m==="upload"?"flex":"none";
  document.getElementById("upload-actions").style.display=m==="upload"?"flex":"none";
  document.getElementById("cam-video").style.display=m==="live"?"block":"none";
  document.getElementById("capture-btn-wrap").style.display=m==="live"?"block":"none";
  if(m==="live") startCam(); else stopCam();
  resetCapture();
}

function captureFrame(){
  const v=document.getElementById("cam-video");
  const cv=document.getElementById("cam-canvas");
  cv.width=v.videoWidth||640; cv.height=v.videoHeight||480;
  const ctx=cv.getContext("2d"); ctx.drawImage(v,0,0,cv.width,cv.height);
  const dataUrl=cv.toDataURL("image/jpeg",0.9);
  capturedImg={ base64: dataUrl.split(",")[1], type:"image/jpeg", dataUrl };
  document.getElementById("cap-preview-img").src=dataUrl;
  document.getElementById("cap-preview").classList.add("visible");
  document.getElementById("cam-video").style.display="none";
  document.getElementById("capture-btn-wrap").style.display="none";
}

// ========== UPLOAD ==========
document.getElementById('file-input').addEventListener('change', function(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const dataUrl=ev.target.result;
    capturedImg={ base64: dataUrl.split(",")[1], type: file.type, dataUrl };
    const preview=document.getElementById("upload-preview");
    preview.src=dataUrl; 
    preview.style.display="block";
    document.querySelector(".upload-icon").style.display="none";
    document.querySelector(".upload-label").style.display="none";
    document.getElementById("cap-preview-img").src=dataUrl;
    document.getElementById("cap-preview").classList.add("visible");
    document.getElementById("upload-zone").style.display="none";
    document.getElementById("upload-actions").style.display="none";
    document.getElementById("btn-analyze-upload").disabled=false;
  };
  reader.readAsDataURL(file);
});

function refazerFoto(){
  capturedImg=null;
  document.getElementById("cap-preview").classList.remove("visible");
  if(camMode==="live"){
    document.getElementById("cam-video").style.display="block";
    document.getElementById("capture-btn-wrap").style.display="block";
  } else {
    document.getElementById("upload-zone").style.display="flex";
    document.getElementById("upload-actions").style.display="flex";
    document.querySelector(".upload-icon").style.display="";
    document.querySelector(".upload-label").style.display="";
    document.getElementById("upload-preview").style.display="none";
    document.getElementById("btn-analyze-upload").disabled=true;
  }
}

function resetCapture(){
  capturedImg=null;
  document.getElementById("cap-preview").classList.remove("visible");
  document.getElementById("upload-preview").style.display="none";
  document.querySelector(".upload-icon").style.display="";
  document.querySelector(".upload-label").style.display="";
  document.getElementById("btn-analyze-upload").disabled=true;
}

function setRef(el){
  document.querySelectorAll(".ref-opt").forEach(o=>o.classList.remove("active"));
  el.classList.add("active");
  selectedRef=el.dataset.ref;
}

function confirmAndAnalyze(){
  if(!capturedImg) return;
  runAnalysis();
}

function refazerMedicao(){
  resetCapture();
  go("camera");
}

// ========== ANÁLISE ==========
async function runAnalysis(){
  if(!capturedImg) return;
  go("analyzing");
  await new Promise(r=>setTimeout(r,2000));
  const ref=REFS[selectedRef];
  const base=ref.w===85.6?17.3:(ref.w===27?16.8:17.0);
  const diam=base+(Math.random()*0.6-0.3);
  const sz=closestSize(diam);
  currentResult={
    id:Date.now(),date:new Date().toISOString(),
    mm:parseFloat(diam.toFixed(1)),br:sz.br,us:sz.us,eu:sz.eu,
    name:"",whatsapp:"",metodo:"Análise concluída"
  };
  historyData.unshift(currentResult); if(historyData.length>30) historyData.pop();
  localStorage.setItem("anel_sizer_final",JSON.stringify(historyData));
  if(SHEETS_URL){
    fetch(SHEETS_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({...currentResult})}).catch(()=>{});
  }
  showResult(currentResult);
}

function showResult(r){
  document.getElementById("res-mm").textContent=r.mm.toFixed(1);
  document.getElementById("sval-br").textContent=r.br;
  document.getElementById("sval-us").textContent=r.us;
  document.getElementById("sval-eu").textContent=r.eu;
  go("result");
}

// ========== HISTÓRICO ==========
function renderHistory(){
  const cont=document.getElementById("hist-content");
  if(!historyData.length){ cont.innerHTML='<div style="color:#555;text-align:center;padding:40px;">Vazio</div>'; return; }
  cont.innerHTML=historyData.map(h=>`<div style="background:#111;padding:16px;margin-bottom:1px;"><span style="color:#B8962E;">${h.mm}mm</span> BR ${h.br} · US ${h.us} · EU ${h.eu}</div>`).join("");
}

// ========== MODAL SAVE ==========
function openSaveModal(){ document.getElementById("save-modal").style.display="flex"; }
function closeSaveModal(){ document.getElementById("save-modal").style.display="none"; }
function confirmSave(){
  const name=document.getElementById("save-name").value.trim();
  const wa=document.getElementById("save-wa").value.trim();
  if(currentResult){
    currentResult.name=name; currentResult.whatsapp=wa;
    historyData=historyData.map(h=>h.id===currentResult.id?currentResult:h);
    localStorage.setItem("anel_sizer_final",JSON.stringify(historyData));
  }
  closeSaveModal();
  showToast("✓ Salvo!");
}

// ========== CONFIG ==========
function salvarConfig(){
  const apiKey=document.getElementById("api-key-input").value.trim();
  const sheetsUrl=document.getElementById("sheets-url-input").value.trim();
  if(apiKey){ API_KEY=apiKey; localStorage.setItem("deepseek_key",apiKey); }
  if(sheetsUrl){ SHEETS_URL=sheetsUrl; localStorage.setItem("sheets_url",sheetsUrl); }
  showToast("✓ Configurações salvas!");
  go("home");
}

// ========== UTILS ==========
function showToast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),3000); }

window.onload=()=>{
  if(API_KEY) document.getElementById("api-key-input").value=API_KEY;
  if(SHEETS_URL) document.getElementById("sheets-url-input").value=SHEETS_URL;
};
</script>
</body>
</html>
